server {
    listen 80;
    server_name 192.168.1.33;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        alias /media/myfiles/projects/alina-kostiuk/static/;
    }
}
